<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Factly</title>
  <meta name="theme-color" content="#0e0e10" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <div class="hint" id="hint">↑↓ nächster Fact · ←→ liken/disliken</div>
  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
  <div id="feed" class="view"></div>
  <section id="saved-view" class="view panel hidden" aria-label="Gespeicherte Facts"></section>
  <section id="settings-view" class="view panel hidden" aria-label="Einstellungen"></section>
  <nav class="bottom-nav" id="nav" aria-label="Bereiche">
    <button data-view="feed" class="active" type="button">Feed</button>
    <button data-view="saved" type="button">Gespeichert</button>
    <button data-view="settings" type="button">Einstellungen</button>
  </nav>
  <!-- Bump the ?v= numbers AND the CACHE version in sw.js whenever
       src/*.js or style.css change — iOS caches aggressively, especially
       once the app is on the home screen. -->
  <script type="module" src="src/main.js?v=13"></script>
</body>
</html>
